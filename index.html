<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaşar Study Spot Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Bornova Study Finder</h1>
            <p>Tailored for Yaşar University International Students</p>
        </header>
        <form id="quiz-form">
            <div class="question-group">
                <label>What is your focus level?</label>
                <select id="focus" required>
                    <option value="F">Deep Focus (High)</option>
                    <option value="low">Casual Reading (Low)</option>
                </select>
            </div>
            <div class="question-group">
                <label>Do you prefer quiet or noisy environments?</label>
                <select id="noise" required>
                    <option value="N">Quiet & Calm</option>
                    <option value="noisy">Vibrant & Noisy</option>
                </select>
            </div>
            <div class="question-group">
                <label>Are you comfortable in Turkish-speaking environments?</label>
                <select id="language" required>
                    <option value="L">Yes, I'm comfortable</option>
                    <option value="notL">I prefer English-friendly spots</option>
                </select>
            </div>
            <div class="question-group">
                <label>Do you want social interaction while studying?</label>
                <select id="social" required>
                    <option value="S">Yes, I like socializing</option>
                    <option value="notS">No, leave me alone</option>
                </select>
            </div>
            <div class="question-group">
                <label>What is your budget level?</label>
                <select id="budget" required>
                    <option value="B">Low Budget / Free</option>
                    <option value="notB">Can spend (Cafe prices)</option>
                </select>
            </div>
            <button type="button" onclick="getResult()">Find My Spot</button>
        </form>
        <div id="result-card" class="hidden">
            <h2 id="recommendation-title"></h2>
            <p id="recommendation-desc"></p>
            <button class="reset-btn" onclick="location.reload()">Start Over</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
